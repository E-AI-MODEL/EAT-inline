name: Conformance

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run EAT Inline 0.3.1 conformance corpus
        run: python scripts/run_conformance.py
