name: Benchmark

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e '.[model]'

      - name: Validate benchmark dataset
        run: python scripts/validate_dataset.py

      - name: Run parser and syntax-overhead benchmark
        run: python scripts/run_benchmark.py

      - name: Compare plain text with EAT Inline
        run: python scripts/run_comparative_benchmark.py

      - name: Reproduce the Wiki-Fair model run
        shell: bash
        run: |
          RUNNER_COMMIT=$(python -c "import json; print(json.load(open('benchmark/results/wiki-fair-v2-tfidf-linker-run.json'))['runner']['commit'])")
          python scripts/run_tfidf_linker.py \
            --training benchmark/external/wiki-fair-v2/dev.training.jsonl \
            --input benchmark/external/wiki-fair-v2/test.inputs.jsonl \
            --dataset benchmark/external/wiki-fair-v2/test.comparison.jsonl \
            --registry benchmark/external/wiki-fair-v2/entity-registry.jsonl \
            --dataset-name wiki-fair-v2/test-no-coref@c9a3fe9c4933888d756d702fdb9ff607fc36aa26 \
            --runner-commit "$RUNNER_COMMIT" \
            --output /tmp/wiki-fair-v2-tfidf-linker-run.json
          cmp benchmark/results/wiki-fair-v2-tfidf-linker-run.json /tmp/wiki-fair-v2-tfidf-linker-run.json
          python scripts/run_recorded_linker_benchmark.py \
            /tmp/wiki-fair-v2-tfidf-linker-run.json \
            --dataset benchmark/external/wiki-fair-v2/test.comparison.jsonl \
            --registry benchmark/external/wiki-fair-v2/entity-registry.jsonl \
            --dataset-name wiki-fair-v2/test-no-coref@c9a3fe9c4933888d756d702fdb9ff607fc36aa26 \
            --output-dir /tmp/wiki-fair-v2-results
          cmp benchmark/results/wiki-fair-v2-tfidf/recorded-linker-results.json /tmp/wiki-fair-v2-results/recorded-linker-results.json
          cmp benchmark/results/wiki-fair-v2-tfidf/recorded-linker-summary.md /tmp/wiki-fair-v2-results/recorded-linker-summary.md

      - name: Reproduce the oracle EAT-assistance curve
        run: |
          python scripts/run_eat_assistance_benchmark.py \
            --run benchmark/results/wiki-fair-v2-tfidf-linker-run.json \
            --model-dataset benchmark/external/wiki-fair-v2/test.comparison.jsonl \
            --oracle-dataset benchmark/external/wiki-fair-v2/test.oracle-eat.jsonl \
            --registry benchmark/external/wiki-fair-v2/entity-registry.jsonl \
            --output-dir /tmp/wiki-fair-v2-eat-assistance
          cmp benchmark/results/wiki-fair-v2-eat-assistance/eat-assistance-results.json /tmp/wiki-fair-v2-eat-assistance/eat-assistance-results.json
          cmp benchmark/results/wiki-fair-v2-eat-assistance/eat-assistance-summary.md /tmp/wiki-fair-v2-eat-assistance/eat-assistance-summary.md
          cmp benchmark/results/wiki-fair-v2-eat-assistance/coverage-by-level.svg /tmp/wiki-fair-v2-eat-assistance/coverage-by-level.svg
          cmp benchmark/results/wiki-fair-v2-eat-assistance/performance-by-level.svg /tmp/wiki-fair-v2-eat-assistance/performance-by-level.svg

      - name: Run the 100,000-document scale-search test
        run: |
          python scripts/run_scale_search_benchmark.py \
            --oracle-dataset benchmark/external/wiki-fair-v2/test.oracle-eat.jsonl \
            --registry benchmark/external/wiki-fair-v2/entity-registry.jsonl \
            --documents 100000 \
            --query-repetitions 100 \
            --query-rounds 20 \
            --output-dir benchmark/results/wiki-fair-v2-scale-search-ci

      - name: Run the 100,000-document one-tag RAG retrieval test
        run: |
          python scripts/run_one_tag_rag_benchmark.py \
            --oracle-dataset benchmark/external/wiki-fair-v2/test.oracle-eat.jsonl \
            --registry benchmark/external/wiki-fair-v2/entity-registry.jsonl \
            --documents 100000 \
            --top-k 10 \
            --query-rounds 3 \
            --hybrid-candidates 100 \
            --output-dir benchmark/results/wiki-fair-v2-one-tag-rag-ci

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: eat-inline-benchmark-${{ github.run_number }}
          path: benchmark/results/
          if-no-files-found: error
          retention-days: 30
