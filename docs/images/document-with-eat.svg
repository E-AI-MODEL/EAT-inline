<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img">
  <title>Example document with EAT Inline</title>
  <desc>A generic document editor showing the same text with three literal EAT Inline references.</desc>
  <style>
    .app { fill: #e8edf3; }
    .bar { fill: #ffffff; stroke: #cbd5e1; }
    .page { fill: #ffffff; stroke: #cbd5e1; }
    .filename { font: 600 15px system-ui, sans-serif; fill: #334155; }
    .pill { fill: #dbeafe; }
    .pill-text { font: 700 11px system-ui, sans-serif; fill: #1d4ed8; letter-spacing: 1px; }
    .heading { font: 700 29px Georgia, serif; fill: #0f172a; }
    .body { font: 19px Georgia, serif; fill: #1e293b; }
    .tag { fill: #dbeafe; stroke: #60a5fa; }
    .tag-text { font: 600 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1e40af; }
    .note { font: 14px system-ui, sans-serif; fill: #64748b; }
  </style>
  <rect class="app" width="800" height="520" rx="18"/>
  <rect class="bar" x="20" y="20" width="760" height="54" rx="10"/>
  <circle cx="48" cy="47" r="7" fill="#ef4444"/>
  <circle cx="70" cy="47" r="7" fill="#f59e0b"/>
  <circle cx="92" cy="47" r="7" fill="#22c55e"/>
  <text class="filename" x="122" y="52">project-update.md</text>
  <rect class="page" x="85" y="94" width="630" height="388" rx="5"/>
  <rect class="pill" x="125" y="126" width="151" height="24" rx="12"/>
  <text class="pill-text" x="141" y="143">EAT INLINE SOURCE</text>
  <text class="heading" x="125" y="194">Project update</text>
  <text class="body" x="125" y="230">The report was written by</text>
  <rect class="tag" x="125" y="242" width="326" height="31" rx="6"/>
  <text class="tag-text" x="138" y="263">@@EAT person:Hans_Visser@@</text>
  <text class="body" x="125" y="305">It describes the</text>
  <rect class="tag" x="125" y="317" width="318" height="31" rx="6"/>
  <text class="tag-text" x="138" y="338">@@EAT project:EAT_Inline@@</text>
  <text class="body" x="125" y="380">test at</text>
  <rect class="tag" x="125" y="392" width="448" height="31" rx="6"/>
  <text class="tag-text" x="138" y="413">@@EAT organisation:EAI_Analyse_Advies@@</text>
  <line x1="125" y1="443" x2="675" y2="443" stroke="#e2e8f0"/>
  <text class="note" x="125" y="467">Software can resolve the exact type and key from the raw text.</text>
</svg>
