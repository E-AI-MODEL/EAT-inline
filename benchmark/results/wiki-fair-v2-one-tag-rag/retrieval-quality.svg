<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 1050 600" role="img">
  <title>One-tag RAG retrieval quality</title>
  <desc>Source-answer accuracy, questions with a correct text result in the top ten, and the correct share of those ten results for name search, EAT after a name match, EAT with the answer ID, and combined search with the answer ID.</desc>
  <style>
    .bg { fill: #ffffff; }
    .title { font: 700 27px system-ui, sans-serif; fill: #111827; }
    .subtitle { font: 15px system-ui, sans-serif; fill: #4b5563; }
    .metric { font: 700 15px system-ui, sans-serif; fill: #111827; text-anchor: end; }
    .value { font: 13px ui-monospace, monospace; fill: #111827; }
    .legend { font: 13px system-ui, sans-serif; fill: #4b5563; }
  </style>
  <rect class="bg" width="1050" height="600"/>
  <text class="title" x="40" y="48">100,000 documents, one EAT tag each</text>
  <text class="subtitle" x="40" y="76">434 source-page questions; the answer uses the first text result</text>
  <rect x="120" y="92" width="16" height="12" rx="2" fill="#9ca3af"/><text class="legend" x="144" y="103">Name search</text><rect x="345" y="92" width="16" height="12" rx="2" fill="#7c3aed"/><text class="legend" x="369" y="103">EAT: name match</text><rect x="570" y="92" width="16" height="12" rx="2" fill="#2563eb"/><text class="legend" x="594" y="103">EAT: answer ID</text><rect x="795" y="92" width="16" height="12" rx="2" fill="#16a34a"/><text class="legend" x="819" y="103">Combined: answer ID</text>
  <text class="metric" x="265" y="197">Source answer</text><rect x="300" y="145" width="426" height="20" rx="3" fill="#9ca3af"/><text class="value" x="741" y="160">77.4%</text><rect x="300" y="173" width="544" height="20" rx="3" fill="#7c3aed"/><text class="value" x="859" y="188">98.9%</text><rect x="300" y="201" width="550" height="20" rx="3" fill="#2563eb"/><text class="value" x="865" y="216">100.0%</text><rect x="300" y="229" width="550" height="20" rx="3" fill="#16a34a"/><text class="value" x="865" y="244">100.0%</text><text class="metric" x="265" y="322">At least one correct in top 10</text><rect x="300" y="270" width="455" height="20" rx="3" fill="#9ca3af"/><text class="value" x="770" y="285">82.7%</text><rect x="300" y="298" width="549" height="20" rx="3" fill="#7c3aed"/><text class="value" x="864" y="313">99.8%</text><rect x="300" y="326" width="550" height="20" rx="3" fill="#2563eb"/><text class="value" x="865" y="341">100.0%</text><rect x="300" y="354" width="550" height="20" rx="3" fill="#16a34a"/><text class="value" x="865" y="369">100.0%</text><text class="metric" x="265" y="447">Correct share of top 10</text><rect x="300" y="395" width="435" height="20" rx="3" fill="#9ca3af"/><text class="value" x="750" y="410">79.1%</text><rect x="300" y="423" width="547" height="20" rx="3" fill="#7c3aed"/><text class="value" x="862" y="438">99.4%</text><rect x="300" y="451" width="550" height="20" rx="3" fill="#2563eb"/><text class="value" x="865" y="466">100.0%</text><rect x="300" y="479" width="550" height="20" rx="3" fill="#16a34a"/><text class="value" x="865" y="494">100.0%</text>
  <text class="subtitle" x="40" y="565">Name match gets only the visible name. The two “answer ID” methods receive the correct ID.</text>
</svg>
