<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="560" viewBox="0 0 1050 560" role="img">
  <title>One-tag RAG retrieval latency</title>
  <desc>Median and 95th percentile search time for name search, EAT after a name match, EAT with the answer ID, and combined search with the answer ID.</desc>
  <style>
    .bg { fill: #ffffff; }
    .title { font: 700 27px system-ui, sans-serif; fill: #111827; }
    .subtitle { font: 15px system-ui, sans-serif; fill: #4b5563; }
    .route { font: 700 14px system-ui, sans-serif; fill: #111827; text-anchor: end; }
    .value { font: 13px ui-monospace, monospace; fill: #111827; }
  </style>
  <rect class="bg" width="1050" height="560"/>
  <text class="title" x="40" y="48">Search time per question</text>
  <text class="subtitle" x="40" y="76">p50: half finish within this time. p95: 95% finish within this time.</text>
  <text class="route" x="200" y="163">Name search</text><rect x="240" y="135" width="16" height="24" rx="3" fill="#9ca3af" opacity="0.65"/><text class="value" x="271" y="152">p50 546.5 µs</text><rect x="240" y="169" width="598" height="24" rx="3" fill="#9ca3af"/><text class="value" x="853" y="186">p95 19950.1 µs</text><text class="route" x="200" y="258">EAT: name match</text><rect x="240" y="230" width="3" height="24" rx="3" fill="#7c3aed" opacity="0.65"/><text class="value" x="258" y="247">p50 93.1 µs</text><rect x="240" y="264" width="11" height="24" rx="3" fill="#7c3aed"/><text class="value" x="266" y="281">p95 371.2 µs</text><text class="route" x="200" y="353">EAT: answer ID</text><rect x="240" y="325" width="3" height="24" rx="3" fill="#2563eb" opacity="0.65"/><text class="value" x="258" y="342">p50 89.0 µs</text><rect x="240" y="359" width="10" height="24" rx="3" fill="#2563eb"/><text class="value" x="265" y="376">p95 329.0 µs</text><text class="route" x="200" y="448">Combined: answer ID</text><rect x="240" y="420" width="22" height="24" rx="3" fill="#16a34a" opacity="0.65"/><text class="value" x="277" y="437">p50 731.1 µs</text><rect x="240" y="454" width="620" height="24" rx="3" fill="#16a34a"/><text class="value" x="875" y="471">p95 20697.6 µs</text>
  <text class="subtitle" x="40" y="530">Name match includes the registry lookup. Combined search also runs ordinary name search.</text>
</svg>
